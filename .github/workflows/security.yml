#
# Thin caller for the org-wide reusable security-scan workflow in
# resq-software/.github. Update the `languages` list to match this repo's
# primary code; everything else inherits.

name: security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '17 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  pull-requests: read

jobs:
  scan:
    uses: resq-software/.github/.github/workflows/security-scan.yml@94363a6a6856b7d86aceac91c4ff7df4bc19ced9 # main
    with:
      languages: '["actions"]'
      enable-semgrep: true
    # Forward only the named secrets the reusable workflow declares, instead
    # of `secrets: inherit` (which hands it ALL of this repo's secrets and
    # trips zizmor's `secrets-inherit` audit).
    secrets:
      SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
