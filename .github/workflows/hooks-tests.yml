#
# Run the bats suite over the canonical git hooks. The hook templates live
# in resq-software/crates; the suite fetches them at bats init time and
# tests behavior (here-string safety, local-* dispatch, stdin propagation,
# GIT_HOOKS_SKIP, etc).

name: hooks-tests

on:
  push:
    branches: [main]
    paths:
      - 'tests/hooks/**'
      - 'scripts/install-hooks.sh'
      - '.github/workflows/hooks-tests.yml'
  pull_request:
    paths:
      - 'tests/hooks/**'
      - 'scripts/install-hooks.sh'
      - '.github/workflows/hooks-tests.yml'
  # Weekly — catches canonical-template drift on the crates side that
  # breaks bats assertions, without requiring a dev-side change to fire.
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bats:
    name: bats
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install bats
        run: |
          sudo apt-get update -y
          sudo apt-get install -y bats

      - name: Run hook test suite
        run: bats tests/hooks/

      - name: Print bats version (diagnostic)
        if: always()
        run: bats --version
