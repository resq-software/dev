updates:
- directory: /
  groups:
    actions:
      patterns:
      - "*"
  ignore:
  - dependency-name: "github/gh-aw-actions*" # Managed by gh aw compile. Version-locked to the gh-aw compiler; do not bump.
  labels:
  - chore
  - deps
  open-pull-requests-limit: 5
  package-ecosystem: github-actions
  schedule:
    day: monday
    interval: weekly
    time: "06:17"
version: 2
